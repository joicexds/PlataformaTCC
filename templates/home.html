<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início - FutureWay</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #06090F;
            --bg-card: #0E131F;
            --color-primary: #00FFAE;
            --color-primary-hover: #00D18F;
            --text-white: #FFFFFF;
            --text-muted: #8A99AD;
            --border-color: #1E293B;
            --color-danger: #F87171;
            --color-danger-bg: #2D191E;
            --color-danger-border: #EF4444;
            --shadow-soft: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--color-primary);
            text-decoration: none;
        }

        .user-nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: var(--text-white);
        }

        .btn-logout {
            background-color: var(--color-danger-bg);
            color: var(--color-danger);
            border: 1px solid var(--color-danger-border);
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background-color: var(--color-danger-border);
            color: #FFFFFF;
        }

        .container {
            flex: 1;
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        .welcome-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 40px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .welcome-card h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            margin-bottom: 16px;
            color: var(--color-primary);
        }

        .welcome-card p {
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="/" class="logo">
            <i data-lucide="rocket"></i>
            <span>FutureWay</span>
        </a>
        <div class="user-nav">
            <span class="user-info">
                <i data-lucide="user" style="width: 18px; height: 18px; color: var(--color-primary);"></i>
                Olá, {{ user.username }}
            </span>
            <a href="{% url 'logout' %}" class="btn-logout">Sair</a>
        </div>
    </header>

    <div class="container">
        <div class="welcome-card">
            <h1>Você está conectado!</h1>
            <p>
                Sua autenticação foi realizada com sucesso através do sistema nativo do Django. A partir daqui, você pode iniciar o desenvolvimento da sua plataforma de orientação vocacional de forma limpa e organizada.
            </p>
        </div>
    </div>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
