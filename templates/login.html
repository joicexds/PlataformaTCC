<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar Plataforma - PlataformaTCC</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #F8FAFC;
            --bg-institucional: #EEF6FF;
            --color-primary: #2563EB;
            --color-primary-hover: #1D4ED8;
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --border-color: #D1D5DB;
            --color-danger: #B91C1C;
            --color-danger-bg: #FEE2E2;
            --shadow-soft: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* Two-Column Grid Layout */
        .login-wrapper {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* 55% Institutional / Left Column */
        .column-presentation {
            width: 55%;
            background-color: var(--bg-institucional);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            text-align: center;
            position: relative;
        }

        .presentation-content {
            max-width: 500px;
            z-index: 2;
        }

        .presentation-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--color-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            font-weight: 700;
            text-decoration: none;
            margin-bottom: 30px;
        }

        .presentation-title {
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            font-weight: 700;
            line-height: 1.25;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .presentation-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .illustration-box {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }

        .illustration-svg {
            width: 100%;
            height: auto;
        }

        /* 45% Login / Right Column */
        .column-login {
            width: 45%;
            background-color: var(--bg-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
            border-left: 1px solid #E5E7EB;
        }

        .login-container {
            width: 100%;
            max-width: 380px;
        }

        .login-header {
            margin-bottom: 32px;
            text-align: left;
        }

        .login-header h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 16px;
            color: var(--text-secondary);
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--text-secondary);
            width: 20px;
            height: 20px;
        }

        .form-control {
            width: 100%;
            height: 50px;
            padding: 12px 16px 12px 48px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            background-color: #FFFFFF;
            color: var(--text-primary);
        }

        .form-control:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .btn-submit {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 12px;
            background-color: var(--color-primary);
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background-color: var(--color-primary-hover);
        }

        .alert-error {
            background-color: var(--color-danger-bg);
            border: 1px solid #FCA5A5;
            color: var(--color-danger);
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Responsiveness */
        @media (max-width: 1024px) {
            .column-presentation {
                display: none;
            }
            .column-login {
                width: 100%;
                border-left: none;
            }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        
        <!-- Left Column: Presentation (55%) -->
        <div class="column-presentation">
            <div class="presentation-content">
                <a href="/" class="presentation-logo">
                    <i data-lucide="rocket" style="width: 32px; height: 32px;"></i>
                    <span>FutureWay</span>
                </a>
                <h1 class="presentation-title">Sua jornada de autoconhecimento começa aqui</h1>
                <p class="presentation-subtitle">
                    Descubra suas habilidades naturais, alinhe seus objetivos e tome decisões de carreira mais assertivas.
                </p>
                <div class="illustration-box">
                    <!-- FutureWay SVG Illustration representing the future -->
                    <svg class="illustration-svg" viewBox="0 0 500 400" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Background stars -->
                        <circle cx="100" cy="80" r="2" fill="#3B82F6" opacity="0.5"/>
                        <circle cx="420" cy="120" r="3" fill="#4FD1C5" opacity="0.6"/>
                        <circle cx="150" cy="220" r="2.5" fill="#3B82F6" opacity="0.4"/>
                        <circle cx="380" cy="260" r="1.5" fill="#4FD1C5" opacity="0.5"/>

                        <!-- Perspective Horizon Grid Lines (representing the pathway of the future) -->
                        <path d="M 50 350 L 250 180 M 450 350 L 250 180 M 150 350 L 250 180 M 350 350 L 250 180 M 250 350 L 250 180" stroke="#93C5FD" stroke-width="2" opacity="0.4"/>
                        <path d="M 80 320 H 420 M 120 280 H 380 M 160 240 H 340 M 200 200 H 300" stroke="#93C5FD" stroke-width="1.5" opacity="0.3"/>

                        <!-- Pathway (The Way) -->
                        <polygon points="250,180 180,350 320,350" fill="url(#way-gradient)" opacity="0.85"/>

                        <!-- Glowing Star/Future Portal at the end of the way -->
                        <circle cx="250" cy="180" r="50" fill="url(#future-glow)"/>
                        <!-- Central Bright Light -->
                        <circle cx="250" cy="180" r="15" fill="#FFFFFF"/>
                        <!-- Decorative Orbit Rings -->
                        <circle cx="250" cy="180" r="60" stroke="#2563EB" stroke-width="2" stroke-dasharray="12 6" opacity="0.5"/>
                        <circle cx="250" cy="180" r="75" stroke="#4FD1C5" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.4"/>

                        <!-- Rocket rising up towards the future/star -->
                        <g transform="translate(242, 120) scale(0.8)">
                            <path d="M 10 0 C 15 10, 15 30, 15 40 L 5 40 C 5 30, 5 10, 10 0 Z" fill="#2563EB"/>
                            <path d="M 10 0 C 7 10, 5 30, 5 40 L 15 40 C 15 30, 13 10, 10 0 Z" fill="#3B82F6"/>
                            <!-- Wings -->
                            <path d="M 5 30 L 0 42 L 5 40 Z" fill="#1D4ED8"/>
                            <path d="M 15 30 L 20 42 L 15 40 Z" fill="#1D4ED8"/>
                            <!-- Fire -->
                            <path d="M 7 42 L 10 52 L 13 42 Z" fill="#FACC15"/>
                        </g>

                        <!-- Gradients definitions -->
                        <defs>
                            <linearGradient id="way-gradient" x1="250" y1="180" x2="250" y2="350" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#2563EB" stop-opacity="0.1"/>
                                <stop offset="1" stop-color="#2563EB" stop-opacity="0.6"/>
                            </linearGradient>
                            <radialGradient id="future-glow" cx="250" cy="180" r="50" fx="250" fy="180" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#FACC15" stop-opacity="1"/>
                                <stop offset="0.4" stop-color="#4FD1C5" stop-opacity="0.8"/>
                                <stop offset="0.8" stop-color="#2563EB" stop-opacity="0.2"/>
                                <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
                            </radialGradient>
                        </defs>
                    </svg>
                </div>
            </div>
        </div>


        <!-- Right Column: Login (45%) -->
        <div class="column-login">
            <div class="login-container">
                
                <div class="login-header">
                    <h2>Acessar</h2>
                    <p class="presentation-subtitle" style="margin-bottom: 0;">Faça login com suas credenciais</p>
                </div>

                <form method="post">
                    {% csrf_token %}

                    {% if form.errors %}
                    <div class="alert-error">
                        <i data-lucide="alert-circle" style="width: 20px; height: 20px; flex-shrink: 0;"></i>
                        <span>Usuário ou senha incorretos.</span>
                    </div>
                    {% endif %}

                    <!-- Username -->
                    <div class="form-group">
                        <label for="id_username">Usuário</label>
                        <div class="input-wrapper">
                            <i data-lucide="user"></i>
                            <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" required id="id_username" class="form-control" placeholder="Digite seu usuário">
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="id_password">Senha</label>
                        <div class="input-wrapper">
                            <i data-lucide="lock"></i>
                            <input type="password" name="password" autocomplete="current-password" required id="id_password" class="form-control" placeholder="Digite sua senha">
                        </div>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn-submit">
                        <span>Entrar</span>
                        <i data-lucide="arrow-right" style="width: 20px; height: 20px;"></i>
                    </button>
                </form>

            </div>
        </div>

    </div>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
