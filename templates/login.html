<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - PlataformaTCC</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #F8FAFC;
            --bg-secondary: #EEF6FF;
            --color-primary: #3B82F6;
            --color-primary-hover: #2563EB;
            --text-primary: #1F2937;
            --text-secondary: #6B7280;
            --color-danger: #EF4444;
            --color-danger-bg: #FEE2E2;
            --border-light: #E2E8F0;
            --shadow-soft: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
            --shadow-medium: 0 10px 15px -3px rgba(59, 130, 246, 0.1), 0 4px 6px -2px rgba(59, 130, 246, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background-color: #FFFFFF;
            border-radius: 16px;
            padding: 40px;
            box-shadow: var(--shadow-medium);
            border: 1px solid var(--border-light);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--color-primary);
            text-decoration: none;
            margin-bottom: 24px;
        }

        .login-header h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-secondary);
            width: 18px;
            height: 18px;
        }

        .form-control {
            width: 100%;
            padding: 12px 14px 12px 42px;
            font-size: 15px;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .form-control:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            background-color: var(--color-primary);
            color: #FFFFFF;
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .btn-submit:hover {
            background-color: var(--color-primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-medium);
        }

        .alert-error {
            background-color: var(--color-danger-bg);
            border: 1px solid #FCA5A5;
            color: #B91C1C;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <!-- Logo -->
        <a href="/" class="logo">
            <i data-lucide="compass" style="width: 28px; height: 28px;"></i>
            <span>PlataformaTCC</span>
        </a>

        <div class="login-header">
            <h2>Bem-vindo(a)</h2>
            <p>Faça login para continuar</p>
        </div>

        <form method="post">
            {% csrf_token %}

            {% if form.errors %}
            <div class="alert-error">
                <i data-lucide="alert-circle" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
                <span>Usuário ou senha incorretos.</span>
            </div>
            {% endif %}

            <div class="form-group">
                <label for="id_username">Usuário</label>
                <div class="input-wrapper">
                    <i data-lucide="user"></i>
                    <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" required id="id_username" class="form-control" placeholder="Digite seu usuário">
                </div>
            </div>

            <div class="form-group">
                <label for="id_password">Senha</label>
                <div class="input-wrapper">
                    <i data-lucide="lock"></i>
                    <input type="password" name="password" autocomplete="current-password" required id="id_password" class="form-control" placeholder="Digite sua senha">
                </div>
            </div>

            <button type="submit" class="btn-submit">
                Entrar
            </button>
        </form>
    </div>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
