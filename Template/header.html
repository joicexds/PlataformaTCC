<header class="top-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--glass-border);">
    <div style="display: flex; align-items: center; gap: 1rem;">
        <button id="menuToggle" style="background: rgba(128,128,128,0.1); border: 1px solid rgba(128,128,128,0.2); color: var(--text-primary); padding: 0.5rem; border-radius: 8px; cursor: pointer;">
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <a href="{% url 'home' %}" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.5rem;">
            <svg width="28" height="28" fill="none" stroke="#3b82f6" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            <span style="font-weight: 700; font-size: 1.2rem; letter-spacing: 0.5px;">Inspetor<span style="color: #3b82f6;">Pro</span></span>
        </a>
    </div>
    
    <div style="display: flex; align-items: center; justify-content: center; flex: 1;">
        {% block header_center %}
        {% if request.resolver_match.url_name == 'home' %}
        <form action="{% url 'empresa_lista' %}" method="get" style="width: 100%; max-width: 500px; margin: 0 2rem; position: relative;">
            <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-secondary);"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" name="search" id="globalSearchInput" placeholder="Buscar empresas..." style="width: 100%; padding: 0.6rem 1rem 0.6rem 2.5rem; background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 20px; outline: none; transition: 0.3s;" class="global-search-input">
        </form>
        {% endif %}
        {% endblock %}
    </div>

    <div style="display: flex; align-items: center; gap: 1.5rem;">
        <button id="themeToggle" title="Alternar Modo Escuro/Claro" style="background: transparent; border: none; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center;">
            <svg id="sunIcon" style="display: block;" width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <svg id="moonIcon" style="display: none;" width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>

        <div style="text-align: right;">
            <span style="font-weight: 600; display: block; color: var(--text-primary);">{{ user.first_name|title|default:user.username }}</span>
            <span style="font-size: 0.8rem; color: var(--text-secondary);">Administrador</span>
        </div>
        <form method="post" action="{% url 'logout' %}" style="margin: 0;">
            {% csrf_token %}
            <button type="submit" class="logout-btn" style="border:none; cursor:pointer;">Sair</button>
        </form>
    </div>
</header>
